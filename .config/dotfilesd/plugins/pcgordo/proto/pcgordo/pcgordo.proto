syntax = "proto3";

package pcgordo;

option go_package = "plugins/pcgordo/proto/pcgordo";

// PcgordoService controls and monitors the PCGORDO desktop PC (Salon)
// via Home Assistant. Supports power management (poweron, shutdown,
// restart, hibernate), monitor control, satellite management, status
// queries, screen captures, and Windows Update monitoring.
// Requires a Home Assistant API token and URL configured in the daemon's
// secrets file.
service PcgordoService {
  // Poweron sends a Wake-on-LAN magic packet to wake the PC from off state.
  rpc Poweron(PoweronRequest) returns (PoweronResponse);
  // Shutdown gracefully shuts down the main PC.
  rpc Shutdown(Empty) returns (ActionResult);
  // Restart reboots the main PC.
  rpc Restart(Empty) returns (ActionResult);
  // Hibernate puts the main PC into hibernation (saves state to disk).
  rpc Hibernate(Empty) returns (ActionResult);
  // MonitorSleep turns off the PC's display monitors.
  rpc MonitorSleep(Empty) returns (ActionResult);
  // MonitorWake turns on the PC's display monitors.
  rpc MonitorWake(Empty) returns (ActionResult);
  // SatelliteHibernate hibernates the salon HTPC satellite.
  rpc SatelliteHibernate(Empty) returns (ActionResult);
  // SatelliteRestart reboots the salon HTPC satellite.
  rpc SatelliteRestart(Empty) returns (ActionResult);
  // SatelliteShutdown shuts down the salon HTPC satellite.
  rpc SatelliteShutdown(Empty) returns (ActionResult);
  // Status queries the full system status from Home Assistant.
  // Returns power state, CPU/GPU metrics, active window, monitor power,
  // and all available entity states.
  rpc Status(Empty) returns (StatusResponse);
  // Screenshot captures the current screen of the PC and returns a URL
  // to the camera entity image. Returns available=false if the PC is
  // offline or the camera is unavailable.
  rpc Screenshot(Empty) returns (ScreenshotResponse);
  // WindowsUpdates queries available and pending Windows updates.
  // Returns separate counts for software and driver updates.
  rpc WindowsUpdates(Empty) returns (WindowsUpdatesResponse);
}

// Generic empty message for RPCs that take no parameters.
message Empty {}

// PoweronRequest contains the MAC address to wake.
message PoweronRequest {
  // MAC address of the target machine (e.g., "bc:fc:e7:b2:e1:f5").
  string mac = 1;
}

// PoweronResponse confirms the power-on packet was sent.
message PoweronResponse {
  // Whether the power-on magic packet was successfully sent.
  bool success = 1;
  // Status message ("poweron packet sent" or error description).
  string message = 2;
}

// ActionResult reports the outcome of a power management action.
message ActionResult {
  // Whether the action was successfully triggered.
  bool success = 1;
  // Status message ("ok" or error description).
  string message = 2;
}

// Home Assistant device class for entity state values.
enum DeviceClass {
  DEVICE_CLASS_UNSPECIFIED = 0;
  DEVICE_CLASS_TEMPERATURE = 1;
  DEVICE_CLASS_POWER = 2;
  DEVICE_CLASS_HUMIDITY = 3;
  DEVICE_CLASS_PRESSURE = 4;
  DEVICE_CLASS_BATTERY = 5;
  DEVICE_CLASS_ENERGY = 6;
  DEVICE_CLASS_CURRENT = 7;
  DEVICE_CLASS_VOLTAGE = 8;
  DEVICE_CLASS_SPEED = 9;
  DEVICE_CLASS_DURATION = 10;
  DEVICE_CLASS_MONETARY = 11;
}

// EntityState represents a single Home Assistant entity.
message EntityState {
  // Entity ID (e.g., "binary_sensor.pcgordo_zerotier_ping").
  string entity_id = 1;
  // Human-readable name from Home Assistant.
  string friendly_name = 2;
  // Current state value.
  string state = 3;
  // Unit of measurement if applicable.
  string unit = 4;
  // Device class if set.
  DeviceClass device_class = 5;
}

// Power state of the managed PC.
enum PCState {
  PC_STATE_UNSPECIFIED = 0;
  // PC is powered on and reachable.
  PC_STATE_ONLINE = 1;
  // PC is powered off or unreachable.
  PC_STATE_OFFLINE = 2;
}

// Power state of the PC's display monitors.
enum MonitorPowerState {
  MONITOR_POWER_STATE_UNSPECIFIED = 0;
  // Monitors are powered on.
  MONITOR_POWER_STATE_ON = 1;
  // Monitors are powered off.
  MONITOR_POWER_STATE_OFF = 2;
  // Monitor power state is unknown or the PC is offline.
  MONITOR_POWER_STATE_UNKNOWN = 3;
}

// StatusResponse contains the full PC status from Home Assistant.
message StatusResponse {
  // Power state of the PC.
  PCState pc_state = 1;
  // Unix timestamp (seconds since epoch) of last boot.
  int64 last_boot = 2;
  // Unix timestamp (seconds since epoch) of last user activity.
  int64 last_active = 3;
  // CPU load as percentage (0-100).
  double cpu_load = 4;
  // GPU load as percentage (0-100).
  double gpu_load = 5;
  // GPU temperature in Celsius.
  double gpu_temp = 6;
  // Memory usage as percentage (0-100).
  double memory_usage = 7;
  // Title of the currently active window.
  string active_window = 8;
  // Name of the currently active virtual desktop.
  string active_desktop = 9;
  // Monitor power state.
  MonitorPowerState monitor_power = 10;
  // Whether the PC is reachable via ZeroTier network ping.
  bool zerotier_ping_reachable = 11;
  // All entity states available for this PC.
  repeated EntityState entities = 12;
}

// ScreenshotResponse provides a URL to a screen capture image.
message ScreenshotResponse {
  // Whether a screenshot is currently available.
  bool available = 1;
  // URL to the screenshot image from the Home Assistant camera entity.
  string image_url = 2;
  // Error message if the screenshot is unavailable.
  string error = 3;
}

// WindowsUpdatesResponse reports available Windows updates.
message WindowsUpdatesResponse {
  // Number of available software (non-driver) updates.
  int32 available_software_updates = 1;
  // Number of pending software updates awaiting reboot.
  int32 pending_software_updates = 2;
  // Number of available driver updates.
  int32 available_driver_updates = 3;
  // Number of pending driver updates awaiting reboot.
  int32 pending_driver_updates = 4;
}
