syntax = "proto3";

package tmuxbar;

option go_package = "plugins/tmuxbar/proto/tmuxbar";

// TmuxBarService provides formatted status bar widgets for tmux via the
// resources plugin. Each RPC returns a pre-formatted text string suitable
// for display in a tmux status line. The StatusBar RPC combines multiple
// widgets into a single compact output.
service TmuxBarService {
  // RAMWidget returns a formatted RAM usage string like "RAM 6.2/15.9 GB 39%".
  // The percent value is also returned as a structured field for custom
  // formatting or threshold-based color coding.
  rpc RAMWidget(RAMWidgetRequest) returns (RAMWidgetResponse);
  // CPUWidget returns a formatted CPU usage string like "CPU 24%".
  rpc CPUWidget(CPUWidgetRequest) returns (CPUWidgetResponse);
  // CPUTempWidget returns a formatted CPU temperature string like "🌡 65°C".
  // Supports Celsius and Fahrenheit units.
  rpc CPUTempWidget(CPUTempWidgetRequest) returns (CPUTempWidgetResponse);
  // BatteryWidget returns a formatted battery status string like "🔋 85%"
  // or "⚡charging". Includes structured percent and charging state for
  // custom formatting.
  rpc BatteryWidget(BatteryWidgetRequest) returns (BatteryWidgetResponse);
  // StatusBar returns a combined compact status line that merges CPU, RAM,
  // and other widgets into a single string like "CPU 24% | RAM 39% | 65°C".
  // Intended as a one-call solution for tmux status-right configuration.
  rpc StatusBar(StatusBarRequest) returns (StatusBarResponse);
  // AsusProfileWidget returns a formatted ASUS performance profile indicator
  // like "#[fg=#E8871A]PERF#[default] " with Monokai-colored output.
  rpc AsusProfileWidget(AsusProfileWidgetRequest) returns (AsusProfileWidgetResponse);
  // GPUProfileWidget returns a formatted GPU mode indicator like
  // "#[fg=#A6E22E]HYBRID#[default] " with Monokai-colored output.
  rpc GPUProfileWidget(GPUProfileWidgetRequest) returns (GPUProfileWidgetResponse);
  // LayoutWidget returns the current keyboard layout (e.g., "us" or "es").
  rpc LayoutWidget(LayoutWidgetRequest) returns (LayoutWidgetResponse);
  // WiFiWidget returns a formatted WiFi signal indicator like
  // "#[fg=#A6E22E]65% (MyNetwork) ◼◼◼◼◼◼◻◻◻◻#[default]".
  rpc WiFiWidget(WiFiWidgetRequest) returns (WiFiWidgetResponse);
}

// RAMWidgetRequest configures the RAM widget output.
message RAMWidgetRequest {
  // Optional format string (not yet implemented, reserved for future use).
  string format = 1;
}

// RAMWidgetResponse contains the RAM widget result.
message RAMWidgetResponse {
  // Formatted text string for display (e.g., "RAM 6.2/15.9 GB 39%").
  string text = 1;
  // RAM usage percentage for custom formatting or thresholds.
  double percent = 2;
}

// CPUWidgetRequest is currently empty.
message CPUWidgetRequest {}

// CPUWidgetResponse contains the CPU widget result.
message CPUWidgetResponse {
  // Formatted text string for display (e.g., "CPU 24%").
  string text = 1;
  // CPU usage percentage for custom formatting or thresholds.
  double percent = 2;
}

// Temperature unit for CPU temperature display.
enum TemperatureUnit {
  TEMPERATURE_UNIT_UNSPECIFIED = 0;
  // Degrees Celsius.
  TEMPERATURE_UNIT_CELSIUS = 1;
  // Degrees Fahrenheit.
  TEMPERATURE_UNIT_FAHRENHEIT = 2;
}

// CPUTempWidgetRequest configures the temperature unit.
message CPUTempWidgetRequest {
  // Temperature unit. Unset means Celsius.
  TemperatureUnit unit = 1;
}

// CPUTempWidgetResponse contains the temperature widget result.
message CPUTempWidgetResponse {
  // Formatted text string for display (e.g., "🌡 65°C").
  string text = 1;
  // Temperature value in the requested unit.
  double temperature = 2;
}

// BatteryWidgetRequest is currently empty.
message BatteryWidgetRequest {}

// BatteryWidgetResponse contains the battery widget result.
message BatteryWidgetResponse {
  // Formatted text string for display (e.g., "🔋 85%" or "⚡charging").
  string text = 1;
  // Battery charge percentage.
  double percent = 2;
  // Whether the battery is currently charging.
  bool charging = 3;
}

// StatusBarRequest configures the combined status bar output.
message StatusBarRequest {
  // Maximum visible width in terminal columns. When set, the server
  // renders widgets in priority order and drops/compacts widgets that
  // don't fit. High-priority widgets (CPU, RAM) are kept, lower-priority
  // ones (WiFi, profiles) are dropped or compacted. 0 means no limit
  // (render all widgets in full form, backward-compatible default).
  int32 max_width = 1;
}

// StatusBarResponse contains the combined status line.
message StatusBarResponse {
  // Combined compact status line (e.g., "CPU 24% | RAM 39% | 65°C").
  string text = 1;
}

// AsusProfileWidgetRequest is empty.
message AsusProfileWidgetRequest {}

// AsusProfileWidgetResponse contains the ASUS performance profile indicator.
message AsusProfileWidgetResponse {
  // Formatted text with tmux color sequences (e.g., "#[fg=#A6E22E]BAL#[default] ").
  string text = 1;
  // Raw profile name ("PERF", "BAL", "QUIET", or "").
  string profile = 2;
}

// GPUProfileWidgetRequest is empty.
message GPUProfileWidgetRequest {}

// GPUProfileWidgetResponse contains the GPU mode indicator.
message GPUProfileWidgetResponse {
  // Formatted text with tmux color sequences (e.g., "#[fg=#A6E22E]HYBRID#[default] ").
  string text = 1;
  // Raw profile name ("EGPU", "NVIDIA", "IGPU", "HYBRID", or "").
  string profile = 2;
}

// LayoutWidgetRequest is empty.
message LayoutWidgetRequest {}

// LayoutWidgetResponse contains the keyboard layout.
message LayoutWidgetResponse {
  // Keyboard layout identifier (e.g., "us" or "es").
  string text = 1;
  // Same as text, the layout name.
  string layout = 2;
}

// WiFiWidgetRequest is empty.
message WiFiWidgetRequest {}

// WiFiWidgetResponse contains the WiFi signal indicator.
message WiFiWidgetResponse {
  // Formatted text with tmux color sequences
  // (e.g., "#[fg=#A6E22E]65% (MyNetwork) ◼◼◼◼◼◼◻◻◻◻#[default]").
  string text = 1;
  // Signal quality percentage (0-100).
  double percent = 2;
  // WiFi SSID of the connected network.
  string ssid = 3;
}
