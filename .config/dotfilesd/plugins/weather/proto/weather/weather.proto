syntax = "proto3";

package weather;

option go_package = "plugins/weather/proto/weather";

// WeatherService provides weather forecasts by querying wttr.in.
// Supports both human-readable formatted output and structured JSON data
// for plugin-to-plugin callers.
service WeatherService {
  // Forecast fetches the weather forecast for a location.
  // Returns current conditions (temperature, humidity, wind, pressure, etc.)
  // from wttr.in. Use format="json" to get structured data for programmatic
  // consumption.
  rpc Forecast(ForecastRequest) returns (ForecastResponse);
}

// Output format for weather forecast results.
enum WeatherFormat {
  // One-line summary of current conditions.
  WEATHER_FORMAT_UNSPECIFIED = 0;
  // One-line text summary (default for human output).
  WEATHER_FORMAT_BRIEF = 1;
  // Multi-line detailed weather report.
  WEATHER_FORMAT_FULL = 2;
  // Structured JSON data for programmatic consumption.
  WEATHER_FORMAT_JSON = 3;
}

// Request for a weather forecast for a specific location.
message ForecastRequest {
  // Location to forecast (city name, "London", "Paris", or IP address).
  // Supports any location that wttr.in understands.
  string location = 1;
  // Output format for the forecast. Use JSON for programmatic consumption.
  WeatherFormat format = 2;
}

// Response containing the weather forecast result.
message ForecastResponse {
  // Raw forecast output from wttr.in. Content depends on format:
  // - BRIEF: one-line text summary
  // - FULL: multi-line detailed report
  // - JSON: structured JSON for programmatic parsing
  string report = 1;
  // Exit code from the curl command. 0 on success, non-zero on error.
  int32 exit_code = 2;
  // Error message if the forecast could not be retrieved (network error,
  // unknown location, etc.).
  string error_message = 3;
}
