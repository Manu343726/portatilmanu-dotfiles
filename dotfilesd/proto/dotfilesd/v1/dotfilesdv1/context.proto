syntax = "proto3";

package dotfilesd.v1;

option go_package = "dotfilesd/proto/dotfilesd/v1/dotfilesdv1";

import "proto/dotfilesd/v1/dotfilesdv1/session.proto";
import "proto/dotfilesd/v1/dotfilesdv1/exec.proto";
import "proto/dotfilesd/v1/dotfilesdv1/feedback.proto";
import "proto/dotfilesd/v1/dotfilesdv1/script.proto";

// ExecutionContext — plugin-to-daemon API. Plugins call back into the daemon
// through this service to execute shell commands, request user input, etc.
// This is the ONLY way a plugin interacts with the host system — plugins
// never access core RPCs directly.
//
// Each plugin gets a dedicated Execution Context that:
//   - Limits access to a subset of daemon capabilities
//   - Authenticates the plugin via a shared secret token (passed as env var
//     EXECUTION_CONTEXT_TOKEN at plugin launch)
//   - Routes requests through the plugin's session for state management
//
// The context reuses message types from exec.proto (ExecRequest, ExecResponse)
// and feedback.proto (InputRequest, InputResponse, etc.) to keep the wire
// format consistent. For SudoExec we use a simplified protocol without the
// challenge-response flow — the daemon handles password elicitation internally.
service ExecutionContext {
  // Exec runs a shell command without privilege escalation.
  rpc Exec(ExecRequest) returns (ExecResponse);

  // SudoExec runs a shell command with sudo. The daemon handles password
  // elicitation internally via its existing sudo flow.
  rpc SudoExec(ContextSudoExecRequest) returns (ContextSudoExecResponse);

  // RequestInput prompts the user for text input.
  rpc RequestInput(InputRequest) returns (InputResponse);

  // RequestConfirm prompts the user for a yes/no confirmation.
  rpc RequestConfirm(ConfirmRequest) returns (ConfirmResponse);

  // RequestChoose prompts the user to pick from a list of options.
  rpc RequestChoose(ChooseRequest) returns (ChooseResponse);

  // Log submits a log entry from a plugin. The daemon routes it through
  // its logging system with the plugin name as the logger module.
  rpc Log(LogRequest) returns (LogResponse);

  // CallPlugin invokes a tool on another loaded plugin. Plugins can use
  // this to delegate work to other plugins instead of shelling out.
  rpc CallPlugin(CallPluginRequest) returns (CallPluginResponse);

  // RunScript runs a registered script or inline script content. Plugins
  // can use this to invoke scripted workflows (which may include feedback
  // steps like confirm/input/choose) without shelling out to dotfilesctl.
  rpc RunScript(RunScriptViaContextRequest) returns (RunScriptViaContextResponse);
}

// ContextSudoExecRequest — simplified sudo exec for plugins. The daemon
// handles password elicitation; the plugin just specifies the command.
message ContextSudoExecRequest {
  Session session = 100;
  string command = 1;
}

// ContextSudoExecResponse — result of a sudo exec from a plugin call.
message ContextSudoExecResponse {
  int32 exit_code = 1;
  string stdout = 2;
  string stderr = 3;
}

// LogEntry represents a single log record from a plugin.
message LogEntry {
  string level = 1;       // trace, debug, info, warn, error, fatal
  string message = 2;
  map<string, string> attributes = 3;
}

// LogRequest is sent by plugins to submit log entries to the daemon.
message LogRequest {
  Session session = 100;
  string plugin_name = 1;
  LogEntry entry = 2;
}

// LogResponse acknowledges receipt of a log entry.
message LogResponse {}

// CallPluginRequest asks the daemon to invoke a tool on another plugin.
message CallPluginRequest {
  Session session = 100;
  string plugin_name = 1;
  string tool_name = 2;
  map<string, string> arguments = 3;
}

// CallPluginResponse returns the result of a plugin tool invocation.
message CallPluginResponse {
  int32 exit_code = 1;
  string stdout = 2;
  string stderr = 3;
  string error_message = 4;  // non-empty if the tool returned a Go error
}

// RunScriptViaContextRequest asks the daemon to run a script.
message RunScriptViaContextRequest {
  Session session = 100;
  oneof source {
    string script = 1;               // inline script content
    string script_path = 2;          // path on the daemon host
    string registered_script = 3;    // registered script name (e.g. "git/commit")
  }
}

// RunScriptViaContextResponse returns the result of a script execution.
message RunScriptViaContextResponse {
  bool all_succeeded = 1;
  repeated StepResult steps = 2;
  string error = 3;  // overall error if script couldn't run
}
