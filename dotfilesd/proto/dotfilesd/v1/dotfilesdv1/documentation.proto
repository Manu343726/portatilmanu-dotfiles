syntax = "proto3";

package dotfilesd.v1;

option go_package = "dotfilesd/proto/dotfilesd/v1/dotfilesdv1";

// DocumentationService provides human-readable documentation for plugin RPC
// services. The daemon CLI and MCP tools use this to generate help text,
// usage hints, and parameter descriptions dynamically.
//
// Plugins get a default implementation via the SDK that returns "not
// implemented". They can override it to provide rich, per-service docs.
service DocumentationService {
  // GetDocumentation returns documentation for a specific service.
  rpc GetDocumentation(DocumentationRequest) returns (DocumentationResponse);
}

message DocumentationRequest {
  // Fully-qualified service name (e.g. "weather.WeatherService").
  // If empty, returns documentation for ALL services exposed by this plugin.
  string service_name = 1;
}

message DocumentationResponse {
  // Documentation format. Defaults to "markdown". Other formats may be
  // supported in the future ("html", "man").
  string format = 1;
  // Documentation content in the requested format.
  string content = 2;
  // Structured documentation, populated when the plugin has embedded docs
  // from protoc-gen-docs. Preferred over format/content for programmatic use.
  Documentation documentation = 3;
}

// Documentation is the structured representation of all documentation for a
// proto package, generated by protoc-gen-docs and embedded in plugins.
message Documentation {
  // Proto package name (e.g. "weather").
  string package = 1;
  // File-level leading comment from the proto file.
  string description = 2;
  // Per-service documentation.
  repeated ServiceDoc services = 3;
  // Top-level message documentation (not nested under services).
  repeated MessageDoc messages = 4;
  // Top-level enum documentation.
  repeated EnumDoc enums = 5;
}

// ServiceDoc documents a single protobuf service.
message ServiceDoc {
  // Fully-qualified service name (e.g. "weather.WeatherService").
  string name = 1;
  // Service description from proto leading comments.
  string description = 2;
  // Per-method documentation.
  repeated MethodDoc methods = 3;
}

// MethodDoc documents a single RPC method with full request/response docs.
message MethodDoc {
  // Method name (e.g. "Forecast").
  string name = 1;
  // Method description from proto leading comments.
  string description = 2;
  // Fully-qualified request type name (e.g. "weather.ForecastRequest").
  string request_type = 3;
  // Fully-qualified response type name (e.g. "weather.ForecastResponse").
  string response_type = 4;
  // Full request message documentation with fields.
  MessageDoc request = 5;
  // Full response message documentation with fields.
  MessageDoc response = 6;
}

// MessageDoc documents a protobuf message, its fields, and nested types.
message MessageDoc {
  // Message name (e.g. "ForecastRequest").
  string name = 1;
  // Message description from proto leading comments.
  string description = 2;
  // Field documentation.
  repeated FieldDoc fields = 3;
  // Nested message types.
  repeated MessageDoc nested_messages = 4;
  // Nested enum types.
  repeated EnumDoc nested_enums = 5;
}

// FieldDoc documents a single field in a protobuf message.
message FieldDoc {
  // Field name (e.g. "location").
  string name = 1;
  // Field description from proto leading comments.
  string description = 2;
  // Human-readable type string (e.g. "string", "int32", "weather.ForecastRequest").
  string type = 3;
  // Label: "optional", "required", "repeated", or empty for proto3 default.
  string label = 4;
  // If true, this field is part of a oneof group.
  bool is_oneof = 5;
  // The oneof group name if is_oneof is true.
  string oneof_name = 6;
  // Default value if any (e.g. "true", "42").
  string default_value = 7;
  // Full documentation of the field's type, populated recursively when the
  // field is a message or enum type.
  oneof type_detail {
    MessageDoc message_doc = 8;
    EnumDoc enum_doc = 9;
  }
}

// EnumDoc documents a protobuf enum type.
message EnumDoc {
  // Enum name (e.g. "Color").
  string name = 1;
  // Enum description from proto leading comments.
  string description = 2;
  // Enum value documentation.
  repeated EnumValueDoc values = 3;
}

// EnumValueDoc documents a single enum value.
message EnumValueDoc {
  // Value name (e.g. "COLOR_RED").
  string name = 1;
  // Numeric value (e.g. 0).
  int32 number = 2;
  // Value description from proto leading comments.
  string description = 3;
}
