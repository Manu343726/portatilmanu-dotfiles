syntax = "proto3";

package dotfilesd.v1;

option go_package = "dotfilesd/proto/dotfilesd/v1/dotfilesdv1";

import "proto/dotfilesd/v1/dotfilesdv1/session.proto";

// ExecService - command execution.
service ExecService {
  // Exec runs a command and returns the complete output.
  rpc Exec(ExecRequest) returns (ExecResponse);

  // ExecStream runs a command and streams stdout/stderr chunks in real
  // time. The final message has done=true with the exit code. Use this
  // for long-running commands (e.g. package updates, builds) where the
  // caller wants to see output as it's produced.
  rpc ExecStream(ExecStreamRequest) returns (stream ExecStreamResponse);

  // SudoExec is a challenge-response protocol for sudo elevation.
  // The first call omits password; if the daemon needs auth it returns
  // AuthChallenge. The client retries with the password.
  rpc SudoExec(SudoExecRequest) returns (SudoExecResponse);

  // BackgroundExec starts a command and keeps it running in the background.
  // The bidirectional stream carries stdin from client→server, stdout/stderr
  // from server→client, and a cancel signal. The command runs until it exits
  // or the client cancels. Only one BackgroundExec per stream.
  rpc BackgroundExec(stream BackgroundExecRequest) returns (stream BackgroundExecResponse);
}

enum SudoMethod {
  SUDO_METHOD_UNSPECIFIED = 0;
  SUDO_METHOD_TERMINAL = 1;
  SUDO_METHOD_GRAPHICAL = 2;
  SUDO_METHOD_NOPASS = 3;
}

message ExecRequest {
  Session session = 100;
  string command = 1;
  bool sudo = 2;
}

message ExecResponse {
  int32 exit_code = 1;
  string stdout = 2;
  string stderr = 3;
}

// ExecStream — same inputs as Exec but output is streamed chunk by chunk.

message ExecStreamRequest {
  Session session = 100;
  string command = 1;
  bool sudo = 2;
}

message ExecStreamResponse {
  // A chunk of stdout output from the command.
  bytes stdout_chunk = 1;
  // A chunk of stderr output from the command.
  bytes stderr_chunk = 2;
  // If true, this is the final message — the command has finished.
  bool done = 3;
  // The command's exit code (only meaningful when done=true).
  int32 exit_code = 4;
  // Non-empty if the command could not be started (Go error).
  string error_message = 5;
}

// --- SudoExec protocol (challenge-response over unary RPC) -----------------

message SudoExecRequest {
  Session session = 100;
  string command = 1;
  string password = 2;
  SudoMethod preferred_method = 3;
}

message SudoExecResponse {
  oneof outcome {
    SudoResult result = 1;
    AuthChallenge auth_challenge = 2;
  }
}

message AuthChallenge {
  repeated string methods = 1;
  string prompt = 2;
}

message SudoResult {
  int32 exit_code = 1;
  string stdout = 2;
  string stderr = 3;
  bool auth_cancelled = 4;
}

// --- BackgroundExec protocol (bidi stream) ---------------------------------

// BackgroundExecRequest is a client→server message on a background exec
// stream. The first message MUST be a start action; subsequent messages
// carry stdin data or a cancel signal.
message BackgroundExecRequest {
  Session session = 100;
  oneof action {
    StartCommand start = 1;
    bytes stdin_chunk = 2;
    bool cancel = 3;
  }
}

// StartCommand configures the background process.
message StartCommand {
  string command = 1;
  bool sudo = 2;
}

// BackgroundExecResponse is a server→client message on a background exec
// stream. The first response is always a started event; subsequent responses
// carry output chunks or a final exit event.
message BackgroundExecResponse {
  oneof event {
    bytes stdout_chunk = 1;
    bytes stderr_chunk = 2;
    ExitEvent exit = 3;
    StartedEvent started = 4;
  }
}

message StartedEvent {
  // Opaque task ID for logging/diagnostics.
  string task_id = 1;
}

message ExitEvent {
  int32 exit_code = 1;
  // Non-empty if the command could not be started (Go error).
  string error_message = 2;
}
