syntax = "proto3";

package dotfilesd.v1;

option go_package = "dotfilesd/proto/dotfilesd/v1/dotfilesdv1";

import "proto/dotfilesd/v1/dotfilesdv1/session.proto";

// FeedbackService — user interaction prompts (input, confirm, choose).
// This is the usage-level service: both CLI tools and plugins use it to
// request user feedback. The daemon routes the prompt through whatever
// channel is available (MCP elicitation, terminal, graphical dialog).
service FeedbackService {
  // RequestInput prompts the user for text input.
  rpc RequestInput(InputRequest) returns (InputResponse);

  // RequestConfirm prompts the user for a yes/no confirmation.
  rpc RequestConfirm(ConfirmRequest) returns (ConfirmResponse);

  // RequestChoose prompts the user to pick from a list of options.
  rpc RequestChoose(ChooseRequest) returns (ChooseResponse);
}

// InputService is called by the daemon when it needs arbitrary text input
// from the user (e.g. a value for a shell variable, git identity config).
service InputService {
  rpc RequestInput(InputRequest) returns (InputResponse);
}

// ConfirmService is called by the daemon when it needs a yes/no
// confirmation before proceeding (e.g. destructive file operation).
service ConfirmService {
  rpc RequestConfirm(ConfirmRequest) returns (ConfirmResponse);
}

// ChooseService is called by the daemon when it needs the user to pick
// from a list of options (e.g. select a git branch, choose a target).
service ChooseService {
  rpc RequestChoose(ChooseRequest) returns (ChooseResponse);
}

message InputRequest {
  Session session = 100;
  // Human-readable prompt describing what input is needed.
  string prompt = 1;
  // Optional default value if the user just presses enter.
  string default = 2;
  // If true, the value is sensitive (e.g. password) and should not be echoed.
  bool sensitive = 3;
}

message InputResponse {
  string session_id = 100;
  // The value provided by the user (or the default).
  string value = 1;
}

message ConfirmRequest {
  Session session = 100;
  // Human-readable message describing what the user is confirming.
  string message = 1;
  // Default choice if the user just presses enter (true = yes).
  bool default_confirm = 2;
}

message ConfirmResponse {
  string session_id = 100;
  // Whether the user confirmed.
  bool confirmed = 1;
}

message ChooseRequest {
  Session session = 100;
  // Human-readable prompt describing what to choose.
  string prompt = 1;
  // The list of options to choose from.
  repeated string options = 2;
  // Index of the default option, -1 if no default.
  int32 default_index = 3;
}

message ChooseResponse {
  string session_id = 100;
  // Index of the selected option, -1 if cancelled.
  int32 selected_index = 1;
  // The selected option text (empty if cancelled).
  string selected_option = 2;
}
