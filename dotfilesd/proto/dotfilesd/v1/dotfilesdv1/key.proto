syntax = "proto3";

package dotfilesd.v1;

option go_package = "dotfilesd/proto/dotfilesd/v1/dotfilesdv1";

import "proto/dotfilesd/v1/dotfilesdv1/session.proto";

// KeyService provides ephemeral ECDH key negotiation over insecure channels.
// Keys are never exposed over the wire — only public keys are exchanged,
// and both sides derive the same shared secret locally.
//
// The shared secret is associated with a (session, key_id) pair and can be
// used for AES-256-GCM encryption/decryption or HMAC signing/verification
// on either side.
service KeyService {
  // NegotiateKey performs an ephemeral X25519 ECDH key exchange.
  // The client sends its public key and a unique key_id; the daemon
  // generates its own ephemeral keypair, derives the shared secret,
  // stores it for the session+key_id, and returns its public key.
  // The client derives the same shared secret locally.
  rpc NegotiateKey(NegotiateKeyRequest) returns (NegotiateKeyResponse);
}

message NegotiateKeyRequest {
  Session session = 100;
  // Opaque identifier for this key — both sides refer to it by this ID
  // when encrypting/decrypting or signing/verifying.
  string key_id = 1;
  // Client's ephemeral X25519 public key (32 bytes).
  bytes client_public_key = 2;
  // Key lifetime in seconds (0 = use daemon default, currently 15 min).
  int32 ttl_seconds = 3;
}

message NegotiateKeyResponse {
  // Daemon's ephemeral X25519 public key (32 bytes).
  bytes server_public_key = 1;
}
