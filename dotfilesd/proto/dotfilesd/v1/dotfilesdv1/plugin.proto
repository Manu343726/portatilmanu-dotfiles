syntax = "proto3";

package dotfilesd.v1;

option go_package = "dotfilesd/proto/dotfilesd/v1/dotfilesdv1";

import "proto/dotfilesd/v1/dotfilesdv1/session.proto";
import "proto/dotfilesd/v1/dotfilesdv1/extension.proto";

// PluginService — plugin discovery and invocation (usage-level).
// Both CLI tools and plugins use this service to list available plugins,
// browse the plugin tree, and invoke plugin tools. All tool invocation
// uses the streaming CallPluginTool RPC; callers that need a buffered
// result (e.g. plugin-to-plugin calls) simply buffer the stream.
service PluginService {
  // ListPlugins returns descriptors for all loaded plugins (flat list).
  rpc ListPlugins(ListPluginsRequest) returns (ListPluginsResponse);
  // ListPluginTree returns the plugin directory hierarchy with loaded
  // plugin descriptors at leaf nodes.
  rpc ListPluginTree(ListPluginTreeRequest) returns (ListPluginTreeResponse);
  // CallPluginTool invokes a tool on a loaded plugin.
  // Returns a stream of output chunks (stdout/stderr) followed by a
  // final done message indicating completion or error.
  rpc CallPluginTool(CallPluginToolRequest) returns (stream CallPluginToolResponse);
}

// PluginTreeEntry represents a node in the plugin directory hierarchy.
// Directories are category groups; leaf entries are loaded Go plugins
// with their ExtensionDescriptor.
message PluginTreeEntry {
  // Basename (e.g. "weather", "tools").
  string name = 1;
  // Relative path from the plugins root (e.g. "tools/weather").
  string path = 2;
  // True if this is a directory with children (not a plugin itself).
  bool is_directory = 3;
  // Description from README.md front matter or plugin descriptor.
  string description = 4;
  // Whether the entry is enabled (controlled via README.md front matter).
  bool enabled = 5;
  // Child entries (only for directories).
  repeated PluginTreeEntry children = 6;
  // The plugin descriptor, set only for leaf (loaded) entries.
  ExtensionDescriptor plugin = 7;
  // Plugin type: "server" (supervised) or "command" (ephemeral).
  string type = 8;
}

message ListPluginTreeRequest {
  Session session = 100;
}

message ListPluginTreeResponse {
  repeated PluginTreeEntry entries = 1;
}

// ---- Plugin listing ----

message ListPluginsRequest {
  Session session = 100;
}

message ListPluginsResponse {
  repeated ExtensionDescriptor plugins = 1;
}

// ---- Plugin tool invocation (streaming, for CLI) ----

message CallPluginToolRequest {
  Session session = 100;
  string plugin_name = 1;
  string tool_name = 2;
  map<string, string> arguments = 3;
}

message CallPluginToolResponse {
  // A chunk of stdout output from the tool.
  bytes stdout_chunk = 1;
  // A chunk of stderr output from the tool.
  bytes stderr_chunk = 2;
  // If true, this is the final message — the tool has finished.
  bool done = 3;
  // If done is true, the tool's error message (empty means success).
  string error_message = 4;
}
