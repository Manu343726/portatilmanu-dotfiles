syntax = "proto3";

package dotfilesd.v1;

option go_package = "dotfilesd/proto/dotfilesd/v1/dotfilesdv1";

import "proto/dotfilesd/v1/dotfilesdv1/session.proto";

// PluginBaseService is the standard service EVERY plugin MUST implement.
// The daemon knows this protocol at compile time and uses it to:
// 1. Discover plugin metadata after handshake
// 2. Discover what custom RPC services the plugin exposes
// 3. Route generic tool calls (for CLI/MCP) if the plugin opts in
//
// Plugins implement this automatically via the SDK's Serve().
service PluginBaseService {
  // GetInfo returns the plugin's identity and capabilities.
  rpc GetInfo(GetInfoRequest) returns (GetInfoResponse);

  // ListServices returns the custom RPC services this plugin exposes.
  // Other plugins can use this (via the daemon's registry) to discover
  // and connect type-safe clients.
  rpc ListServices(ListServicesRequest) returns (ListServicesResponse);

  // GetDocumentation returns structured documentation for this plugin's
  // services. Used by CLI help, MCP tool descriptions, etc.
  // Plugins MAY implement this; if not, the daemon falls back to
  // parsing service descriptors via grpcreflect.
  rpc GetDocumentation(GetDocumentationRequest) returns (GetDocumentationResponse);
}

message GetInfoRequest {}

message GetInfoResponse {
  // Unique plugin name (e.g. "weather", "backup").
  string name = 1;
  // Human-readable display name.
  string display_name = 2;
  // Semantic version.
  string version = 3;
  // Short description.
  string description = 4;
  // Author/maintainer info.
  string author = 5;
  // Plugin type: "server" (long-lived) or "command" (ephemeral).
  string type = 6;
}

message ListServicesRequest {}

// ServiceDescriptor describes a custom RPC service exposed by a plugin.
message ServiceDescriptor {
  // Fully-qualified service name, e.g. "dotfilesd.v1.WeatherService".
  string name = 1;
  // Human-readable description.
  string description = 2;
  // Whether this service is accessible to other plugins.
  // If false, it's internal to the plugin or daemon-only.
  bool plugin_accessible = 3;
  // Method names for quick reference.
  repeated string methods = 4;
  // Optional: URL to external documentation.
  string docs_url = 5;
}

message ListServicesResponse {
  repeated ServiceDescriptor services = 1;
}

message GetDocumentationRequest {
  // Optional: filter to a specific service.
  string service_name = 1;
}

message GetDocumentationResponse {
  // Structured documentation for the plugin or a specific service.
  // Format is plugin-defined; common formats include Markdown, JSON Schema,
  // or OpenAPI. The daemon uses this for CLI --help, MCP tool descriptions, etc.
  string format = 1;  // e.g. "markdown", "json-schema", "openapi-3.0"
  string content = 2; // the actual documentation content
}
