syntax = "proto3";

package dotfilesd.v1;

import "proto/dotfilesd/v1/dotfilesdv1/session.proto";

option go_package = "dotfilesd/proto/dotfilesd/v1/dotfilesdv1";

// PluginRegistryService is exposed by the daemon so plugins can discover
// and connect to each other's custom RPC services.
//
// This is a READ-ONLY service. It serves as the single source of truth for
// plugin metadata. The daemon populates the registry at plugin load time via
// grpcreflect, extracting full type introspection data (service names,
// methods, request/response message schemas with all fields, types, enums).
// Clients (CLI, MCP bridge, plugins) read from the registry exclusively —
// they never need to perform their own grpcreflect against plugin processes.
service PluginRegistryService {
  // GetPlugin returns connection info for a named plugin.
  rpc GetPlugin(RegistryGetPluginRequest) returns (RegistryGetPluginResponse);

  // ListPlugins returns all registered plugins.
  rpc ListPlugins(RegistryListPluginsRequest) returns (RegistryListPluginsResponse);

  // LoadPlugin loads a plugin by name, including its dependencies.
  rpc LoadPlugin(RegistryLoadPluginRequest) returns (RegistryLoadPluginResponse);

  // UnloadPlugin stops a plugin by name.
  rpc UnloadPlugin(RegistryUnloadPluginRequest) returns (RegistryUnloadPluginResponse);

  // ReloadPlugins rescans the plugins directory, loading new plugins
  // and removing plugins whose directories no longer exist.
  rpc ReloadPlugins(RegistryReloadPluginsRequest) returns (RegistryReloadPluginsResponse);
}

message RegistryGetPluginRequest {
  Session session = 100;
  // Name of the plugin to look up.
  string plugin_name = 1;
}

message RegistryGetPluginResponse {
  // Plugin identifier name (e.g. "weather").
  string name = 1;
  // Human-readable display name (e.g. "Weather Service").
  string display_name = 2;
  // Plugin version string.
  string version = 3;
  // Plugin description from its front-matter.
  string description = 4;
  // Base URL of the plugin's RPC server (e.g. "http://127.0.0.1:12345").
  string url = 5;
  // Names of custom RPC services exposed by this plugin.
  repeated string services = 6;
  // Full type introspection data for every service exposed by this plugin.
  // Populated by the daemon at load time via grpcreflect.
  repeated ServiceSchema schemas = 7;
}

message RegistryListPluginsRequest {
  Session session = 100;
}

message RegistryListPluginsResponse {
  repeated RegistryGetPluginResponse plugins = 1;
}

message RegistryLoadPluginRequest {
  string plugin_name = 1;
}

message RegistryLoadPluginResponse {
  // The loaded plugin's metadata.
  RegistryGetPluginResponse plugin = 1;
  // Dependencies loaded alongside this plugin.
  repeated string loaded_deps = 2;
  // Error message if the plugin could not be loaded (empty on success).
  string error = 3;
}

message RegistryUnloadPluginRequest {
  string plugin_name = 1;
}

message RegistryUnloadPluginResponse {
  // Error message if the plugin could not be unloaded (empty on success).
  string error = 1;
}

message RegistryReloadPluginsRequest {}

message RegistryReloadPluginsResponse {
  // Names of plugins that were loaded during the reload.
  repeated string loaded = 1;
  // Names of plugins that were unloaded during the reload.
  repeated string unloaded = 2;
  // Error message if the reload encountered issues (empty on success).
  string error = 3;
}

// PluginExecutorService proxies RPC calls to plugins. The CLI opens a
// bidi stream, sends the request, and receives real-time stdout/stderr
// chunks from the plugin followed by the final response.
service PluginExecutorService {
  // CallPlugin opens a bidi stream between a client (CLI/MCP) and a plugin.
  //  1. Client sends CallPluginRequest (plugin, service, method, body)
  //  2. Daemon forwards the call to the plugin, connecting the client's
  //     stdin/stdout/stderr to the plugin's via the daemon
  //  3. Plugin responds with chunks (stdout, stderr, final response)
  //  4. Client can send stdin chunks for interactive plugins
  rpc CallPlugin(stream CallPluginMessage) returns (stream CallPluginMessage);
}

message CallPluginMessage {
  // Target plugin name (e.g. "weather").
  string plugin_name = 1;
  // Target service name (e.g. "WeatherService").
  string service = 2;
  // Target method name (e.g. "Forecast").
  string method = 3;
  // Serialized request body (protobuf binary).
  bytes request_body = 4;
  // Unique client identifier for stream multiplexing.
  string client_id = 5;
  // When true, plugin writes human-readable output to stdout.
  // When false, returns structured JSON.
  bool render_output = 11;

  // Stdout chunk streamed from the plugin.
  bytes stdout_chunk = 6;
  // Stderr chunk streamed from the plugin.
  bytes stderr_chunk = 7;
  // Stdin chunk sent to the plugin (for interactive sessions).
  bytes stdin_chunk = 8;
  // Terminal resize notification from the client.
  WindowSize window_size = 12;

  // Serialized response body (protobuf binary).
  bytes response_body = 9;
  // Error message if the call failed (empty on success).
  string error = 10;
}

// WindowSize carries terminal dimension changes from the CLI caller
// to the plugin's PTY-backed TTYConn.
message WindowSize {
  int32 width = 1;
  int32 height = 2;
}

// ─────────────────────────────────────────────
// Type introspection messages
// ─────────────────────────────────────────────

// FieldKind mirrors protobuf field types.
enum FieldKind {
  FIELD_KIND_UNSPECIFIED = 0;
  FIELD_KIND_DOUBLE = 1;
  FIELD_KIND_FLOAT = 2;
  FIELD_KIND_INT64 = 3;
  FIELD_KIND_UINT64 = 4;
  FIELD_KIND_INT32 = 5;
  FIELD_KIND_FIXED64 = 6;
  FIELD_KIND_FIXED32 = 7;
  FIELD_KIND_BOOL = 8;
  FIELD_KIND_STRING = 9;
  FIELD_KIND_BYTES = 10;
  FIELD_KIND_UINT32 = 11;
  FIELD_KIND_SFIXED32 = 15;
  FIELD_KIND_SFIXED64 = 16;
  FIELD_KIND_SINT32 = 17;
  FIELD_KIND_SINT64 = 18;
  FIELD_KIND_ENUM = 13;
  FIELD_KIND_MESSAGE = 14;
}

// FieldLabel indicates whether a field is optional, required, or repeated.
enum FieldLabel {
  FIELD_LABEL_UNSPECIFIED = 0;
  FIELD_LABEL_OPTIONAL = 1;
  FIELD_LABEL_REQUIRED = 2;
  FIELD_LABEL_REPEATED = 3;
}

// FieldSchema describes a single field in a protobuf message.
message FieldSchema {
  // Field name (e.g. "location").
  string name = 1;
  // Human-readable description of the field.
  string description = 2;
  // Protobuf field type kind.
  FieldKind kind = 3;
  // Whether the field is optional, required, or repeated.
  FieldLabel label = 4;

  // For message/enum kinds, the fully-qualified type name.
  // e.g. "weather.Unit" or "weather.ForecastRequest".
  // Clients can look up the full schema by correlating with MessageSchema/enum
  // names in the enclosing ServiceSchema tree.
  string type_name = 5;

  // Inline enum schema when this field is of enum kind.
  // This saves clients from having to cross-reference a separate type registry.
  EnumSchema enum_schema = 6;
}

// EnumValue describes a single enum value.
message EnumValue {
  // Enum value name (e.g. "COLOR_RED").
  string name = 1;
  // Numeric value of this enum entry.
  int32 number = 2;
  // Description extracted from proto source comments.
  string description = 3;
}

// EnumSchema describes a protobuf enum type.
message EnumSchema {
  // Fully-qualified enum name (e.g. "weather.Unit").
  string name = 1;
  // Human-readable description of the enum.
  string description = 2;
  // Enum value definitions.
  repeated EnumValue values = 3;
}

// MessageSchema describes a protobuf message type, with full recursive
// field metadata. Nested messages and enums are inlined so clients have
// everything they need without additional lookups.
message MessageSchema {
  // Fully-qualified message name (e.g. "weather.ForecastRequest").
  string name = 1;
  // Human-readable description of the message.
  string description = 2;
  // Fields declared directly on this message.
  repeated FieldSchema fields = 3;
  // Enum types nested inside this message.
  repeated EnumSchema enums = 4;
  // Message types nested inside this message.
  repeated MessageSchema messages = 5;
}

// MethodSchema describes an RPC method with full request/response schemas.
message MethodSchema {
  // Method name (e.g. "Forecast").
  string name = 1;
  // Human-readable description of the method.
  string description = 2;
  // Full schema of the request message.
  MessageSchema request = 3;
  // Full schema of the response message.
  MessageSchema response = 4;
  // True when this method requires interactive stdin (e.g. TUI games).
  // The daemon uses this hint to decide whether to set up raw terminal
  // mode and stdin forwarding for CLI calls to this method.
  bool needs_interactive_stdin = 5;
}

// ServiceSchema describes a service — the full introspection result for one
// service exposed by a plugin.
message ServiceSchema {
  // Fully-qualified service name (e.g. "weather.WeatherService").
  string name = 1;
  // Human-readable description of the service.
  string description = 2;
  // RPC methods exposed by this service.
  repeated MethodSchema methods = 3;
}
