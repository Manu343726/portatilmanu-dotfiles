syntax = "proto3";

package dotfilesd.v1;

option go_package = "dotfilesd/proto/dotfilesd/v1/dotfilesdv1";

// SystemService - daemon health and system information.
service SystemService {
  rpc Ping(PingRequest) returns (PingResponse);
  rpc SystemInfo(SystemInfoRequest) returns (SystemInfoResponse);
  rpc SudoMethods(SudoMethodsRequest) returns (SudoMethodsResponse);
}

// DotfilesService - dotfiles repository management.
service DotfilesService {
  rpc Status(StatusRequest) returns (StatusResponse);
  rpc Git(GitRequest) returns (GitResponse);
}

// ExecService - command execution.
service ExecService {
  // Simple unary exec (no sudo).
  rpc Exec(ExecRequest) returns (ExecResponse);
  // Challenge-response sudo. The first call omits password; if the daemon
  // needs auth it returns AuthChallenge. The client retries with the password.
  rpc SudoExec(SudoExecRequest) returns (SudoExecResponse);
}

// ConfigService - dotfiles configuration reload, daemon reconfiguration, and restart.
service ConfigService {
  rpc Reload(ReloadRequest) returns (ReloadResponse);
  rpc Reconfigure(ReconfigureRequest) returns (ReconfigureResponse);
  rpc Restart(RestartRequest) returns (RestartResponse);
}

message PingRequest {}
message PingResponse {
  string version = 1;
  int64 pid = 2;
  int64 uptime_secs = 3;
}

message StatusRequest {}
message StatusResponse {
  bool git_clean = 1;
  string git_branch = 2;
  int32 git_ahead = 3;
  int32 git_behind = 4;
  string last_commit = 5;
  string uptime = 6;
  string hostname = 7;
}

message ExecRequest {
  string command = 1;
  bool sudo = 2;
}

message ExecResponse {
  int32 exit_code = 1;
  string stdout = 2;
  string stderr = 3;
}

message ReloadRequest {
  string target = 1; // "tmux", "i3", "kitty", "all"
}

message ReloadResponse {
  message ReloadResult {
    string target = 1;
    bool success = 2;
    string message = 3;
  }
  repeated ReloadResult results = 1;
}

message GitRequest {
  string action = 1;  // "status", "diff", "add", "commit", "push", "log"
  string message = 2; // commit message (required for "commit")
  string paths = 3;   // space-separated (default: all tracked)
}

message GitResponse {
  int32 exit_code = 1;
  string stdout = 2;
  string stderr = 3;
}

message SystemInfoRequest {}
message SystemInfoResponse {
  string os = 1;
  string kernel = 2;
  string shell = 3;
  string desktop = 4;
  int64 memory_total_kb = 5;
  int64 memory_avail_kb = 6;
  double cpu_load_1m = 7;
  string tmux_version = 8;
  string kitty_version = 9;
  string i3_version = 10;
}

message SudoMethodsRequest {}
message SudoMethodsResponse {
  repeated string available_methods = 1;
  string current_method = 2;
  bool has_elevation = 3;
}

// --- SudoExec protocol (challenge-response over unary RPC) -----------------

message SudoExecRequest {
  string command = 1;
  string password = 2;          // empty on first call, filled on retry
  string preferred_method = 3;  // "terminal", "graphical", "nopass"
}

message SudoExecResponse {
  oneof outcome {
    SudoResult result = 1;
    AuthChallenge auth_challenge = 2;
  }
}

message AuthChallenge {
  repeated string methods = 1;
  string prompt = 2;
}

message SudoResult {
  int32 exit_code = 1;
  string stdout = 2;
  string stderr = 3;
  bool auth_cancelled = 4;
}

// --- Reconfigure / Restart ---------------------------------------------------

message ReconfigureRequest {
  string log_level = 1; // "trace", "debug", "info", "warn", "error"
}

message ReconfigureResponse {
  bool success = 1;
  string message = 2;
}

message RestartRequest {}

message RestartResponse {
  string message = 1;
}
