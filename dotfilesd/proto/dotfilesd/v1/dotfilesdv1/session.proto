syntax = "proto3";

package dotfilesd.v1;

option go_package = "dotfilesd/proto/dotfilesd/v1/dotfilesdv1";

// SessionService - session management for grouping related requests.
service SessionService {
  // CreateSession creates a new session and returns its ID.
  rpc CreateSession(CreateSessionRequest) returns (CreateSessionResponse);
  // Connect registers the client's callback URL with a session and starts
  // the client↔daemon feedback channel. If session_id is empty a new
  // session is created automatically.
  rpc Connect(ConnectRequest) returns (ConnectResponse);
  // FinalizeSession marks a session as complete. No further requests
  // may use this session after finalization.
  rpc FinalizeSession(FinalizeSessionRequest) returns (FinalizeSessionResponse);
  // GetSession returns session metadata and state.
  rpc GetSession(GetSessionRequest) returns (GetSessionResponse);
  // ListSessions returns all active (non-finalized) sessions.
  rpc ListSessions(ListSessionsRequest) returns (ListSessionsResponse);
}

// Shell context from the CLI — tells the daemon the exact terminal environment
// so commands behave as if run directly in the user's terminal.
message Shell {
  string current_shell = 1;     // shell binary path (e.g. "/usr/bin/zsh")
  string cwd = 2;               // current working directory
  map<string, string> env = 3;  // environment variables
}

message Session {
  // Unique session identifier (UUID).
  string id = 1;
  // Unix timestamp (seconds since epoch) of session creation.
  int64 created_at = 2;
  // Unix timestamp (seconds since epoch) of the most recent request using this session.
  int64 last_active = 3;
  // Number of requests made within this session.
  int32 request_count = 4;
  // Whether the session has been finalized.
  bool finalized = 5;
  // Arbitrary key-value data associated with the session.
  map<string, string> data = 6;
  // Session variables that are injected into the shell environment for exec calls.
  map<string, string> variables = 7;
  // CLI shell context (working directory, shell binary, environment).
  Shell shell = 8;
}

message CreateSessionRequest {
  Session session = 100;
}

message CreateSessionResponse {
  // The newly created session.
  Session session = 1;
}

message FinalizeSessionRequest {
  Session session = 100;
}

message FinalizeSessionResponse {
  // Whether the session was finalized successfully.
  bool success = 1;
  // Human-readable message (empty on success, error description on failure).
  string message = 2;
}

message GetSessionRequest {
  Session session = 100;
}

message GetSessionResponse {
  // The requested session metadata.
  Session session = 1;
}

message ConnectRequest {
  // Base URL of the client's feedback server (e.g. "http://127.0.0.1:43291")
  // where the daemon can call InputService, ConfirmService, etc.
  string callback_url = 1;
  // Session to register the callback with. If empty the daemon creates a
  // new session.
  Session session = 100;
}

message ConnectResponse {
  // The session the callback URL was registered with.
  Session session = 1;
}

message ListSessionsRequest {
  Session session = 100;
}

message ListSessionsResponse {
  // List of all active (non-finalized) sessions.
  repeated Session sessions = 1;
}
