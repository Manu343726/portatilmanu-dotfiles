syntax = "proto3";

package dotfilesd.v1;

option go_package = "dotfilesd/proto/dotfilesd/v1/dotfilesdv1";

import "proto/dotfilesd/v1/dotfilesdv1/session.proto";

// SystemService — daemon health and runtime environment (admin-only).
// Ping returns daemon identity. RuntimeInfo describes the OS and host.
// SudoMethods reports available privilege escalation paths.
// These RPCs are not exposed to plugins — only CLI tools and internal
// daemon components can query this information.
service SystemService {
  rpc Ping(PingRequest) returns (PingResponse);
  rpc RuntimeInfo(RuntimeInfoRequest) returns (RuntimeInfoResponse);
  rpc SudoMethods(SudoMethodsRequest) returns (SudoMethodsResponse);

  // Diagnostics returns a structured diagnostic tree of the daemon state.
  rpc Diagnostics(DiagnosticsRequest) returns (DiagnosticsResponse);
}

message PingRequest {
  Session session = 100;
}
message PingResponse {
  string version = 1;
  int64 pid = 2;
  int64 uptime_secs = 3;
}

message RuntimeInfoRequest {
  Session session = 100;
}
message RuntimeInfoResponse {
  // Operating system (always "linux").
  string os = 1;
  // Kernel version (uname -r).
  string kernel = 2;
  // Current shell binary path.
  string shell = 3;
  // Desktop environment name (XDG_CURRENT_DESKTOP).
  string desktop = 4;
  // Machine hostname.
  string hostname = 5;
  // System uptime (uptime -p).
  string uptime = 6;
  // Tools found on PATH: sudo, pkexec, tmux, i3, kitty, etc.
  repeated string available_tools = 7;
}

message SudoMethodsRequest {
  Session session = 100;
}
message SudoMethodsResponse {
  repeated string available_methods = 1;
  string current_method = 2;
  bool has_elevation = 3;
}

// ─────────────────────────────────────────────
// Diagnostics messages
// ─────────────────────────────────────────────

message DiagnosticsRequest {
  Session session = 100;
}

// DiagNode represents one node in the daemon state tree.
// Each node has a type label, a description, optional metadata,
// and child nodes forming a parent-child hierarchy.
message DiagNode {
  string type = 1;    // node type: "daemon", "client", "executor", "session",
                       // "plugin", "bg_task", "script", "exec_command"
  string label = 2;   // human-readable name (e.g. "cli_xxx", "resources.ResourcesService.Current")
  string status = 3;  // status: "active", "idle", "finalized", "running"
  map<string, string> attrs = 4; // key-value details (pid, url, version, command, callback, etc.)
  repeated DiagNode children = 5;
}

message DiagnosticsResponse {
  DiagNode root = 1;  // full tree rooted at the daemon
}
