syntax = "proto3";

package dotfilesd.v1;

import "proto/dotfilesd/v1/dotfilesdv1/session.proto";

option go_package = "dotfilesd/proto/dotfilesd/v1/dotfilesdv1";

// SystemService — daemon health and runtime environment (admin-only).
// Ping returns daemon identity. RuntimeInfo describes the OS and host.
// SudoMethods reports available privilege escalation paths.
// These RPCs are not exposed to plugins — only CLI tools and internal
// daemon components can query this information.
service SystemService {
  // Ping returns the daemon version, process ID, and uptime. Use this for health checks and liveness probes.
  rpc Ping(PingRequest) returns (PingResponse);
  rpc RuntimeInfo(RuntimeInfoRequest) returns (RuntimeInfoResponse);
  rpc SudoMethods(SudoMethodsRequest) returns (SudoMethodsResponse);
}

message PingRequest {
  Session session = 100;
}
message PingResponse {
  // Daemon version string.
  string version = 1;
  // Process ID of the daemon.
  int64 pid = 2;
  // Daemon uptime in seconds.
  int64 uptime_secs = 3;
}

message RuntimeInfoRequest {
  Session session = 100;
}
message RuntimeInfoResponse {
  // Operating system (always "linux").
  string os = 1;
  // Kernel version (uname -r).
  string kernel = 2;
  // Current shell binary path.
  string shell = 3;
  // Desktop environment name (XDG_CURRENT_DESKTOP).
  string desktop = 4;
  // Machine hostname.
  string hostname = 5;
  // System uptime (uptime -p).
  string uptime = 6;
  // Tools found on PATH: sudo, pkexec, tmux, i3, kitty, etc.
  repeated string available_tools = 7;
}

message SudoMethodsRequest {
  Session session = 100;
}
message SudoMethodsResponse {
  // Available sudo methods detected on the system (e.g. sudo, pkexec).
  repeated string available_methods = 1;
  // The currently active sudo method.
  string current_method = 2;
  // Whether the daemon currently has sudo elevation (cached credentials).
  bool has_elevation = 3;
}
